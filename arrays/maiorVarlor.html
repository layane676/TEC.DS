<script>
    var numeros = [12, 45, 8, 91, 32];

    // 1. Assusmimos que o primeiro numeor é o maior(12)
    var maior_numero = numeros[0];
    // 2. Interação nos demais (itens à partir do 1)
    for (var i = 1; i < numeros.length; i++) {
    // 3. Para cada loop verifica se o valor interado é maior que o atual
        if (numeros[i] > maior_numero){
            // 4. Se for maior, atribui a variavel
            maior_numero = numeros[i];
        }
    }
    alert("Maior numero:" + maior_numero);
</script>

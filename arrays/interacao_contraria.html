<script>
    var etapas = ["Lavar","Passar","Dobrar","Guardar"];
    // 1. a inicialização deve começar pelo último índice
    // 2. a condição tem que verificar se é maior/igual a 0
    // 3. utiliza decremento ao ínves de incremento
    for (var i = etapas.length - 1; i >= 0; i--) {
        alert("Etapa ", +  (i + 1) + ": " + etapas[i]);
    }
</script>
